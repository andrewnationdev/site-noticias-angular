<article class="group cursor-pointer border-b border-gray-50 pb-16 last:border-0" onclick="app.openArticle(${article.id})">
    <div class="flex items-center gap-4 text-[10px] font-sans text-gray-400 mb-4 uppercase tracking-widest">
        <span class="text-black font-extrabold">Cultura</span>
        <span>•</span>
        <span>01 Março, 2026</span>
        <span>•</span>

    </div>
