<div class="max-w-3xl mx-auto px-6 py-16">
    <h1 class="text-4xl sm:text-5xl font-bold leading-[1.05] mb-10 tracking-tight">Artigos Favoritos</h1>
    <a href=""
            class="text-xs font-sans font-bold uppercase tracking-widest text-amber-800 opacity-50 hover:opacity-100 transition-opacity">
            DELETAR TODOS OS FAVORITOS
        </a>
    <hr />
    <div class="mt-4">@for (favorite of favorites; track favorite?.id) {
        <app-post-summary [post]="favorite"></app-post-summary>
        <a href=""
            class="text-xs font-sans font-bold uppercase tracking-widest text-amber-800 opacity-50 hover:opacity-100 transition-opacity">
            DELETAR
        </a>
        }
    </div>
</div>
